<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 112" role="img" aria-labelledby="title desc">
  <title id="title">Nuttall Henderson Jewellers logo</title>
  <desc id="desc">Nuttall Henderson Jewellers local wordmark for the portfolio experience section.</desc>
  <defs>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fff4b8"/>
      <stop offset="0.48" stop-color="#b9a45a"/>
      <stop offset="1" stop-color="#f8edb5"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="1" dy="2" stdDeviation="1.2" flood-color="#0f172a" flood-opacity="0.28"/>
    </filter>
  </defs>
  <rect width="360" height="112" rx="28" fill="#ffffff"/>
  <g filter="url(#shadow)">
    <text x="18" y="48" font-family="Georgia, 'Times New Roman', serif" font-size="38" font-weight="700" fill="url(#gold)" letter-spacing="-1.4">NUTTALL</text>
    <text x="18" y="82" font-family="Georgia, 'Times New Roman', serif" font-size="37" font-weight="700" fill="url(#gold)" letter-spacing="-1.7">HENDERSON</text>
    <text x="252" y="86" font-family="Brush Script MT, Segoe Script, cursive" font-size="27" font-style="italic" fill="#a89a58" transform="rotate(-9 252 86)">Jewellers</text>
  </g>
</svg>
